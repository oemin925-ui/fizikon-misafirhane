databases:
  - name: fizikon-misafirhane-db
    plan: free
    region: frankfurt
    databaseName: fizikonmisafirhane
    user: fizikonmisafirhane

services:
  - type: web
    name: fizikonmisafirhane
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fizikon-misafirhane-db
          property: connectionString
      - key: MAIL_PROVIDER_MODE
        value: brevo
      - key: MAIL_FROM_NAME
        value: Fizikon Misafirhane
      - key: MAIL_FROM_ADDRESS
        value: bilgiislem@fizikon.com
      - key: BREVO_API_BASE_URL
        value: https://api.brevo.com
      - key: BREVO_API_KEY
        sync: false
