databases:
  - name: fizikon-misafirhane-db
    plan: free
    region: frankfurt
    databaseName: fizikonmisafirhane
    user: fizikonmisafirhane

services:
  - type: web
    name: fizikonmisafirhane
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fizikon-misafirhane-db
          property: connectionString
      - key: MAIL_PROVIDER_MODE
        value: disabled
      - key: MAIL_FROM_ADDRESS
        value: bilgiislem@fizikon.com
      - key: MAIL_SMTP_HOST
        value: smtp.yandex.com
      - key: MAIL_SMTP_PORT
        value: "587"
      - key: MAIL_SMTP_SECURE
        value: "true"
      - key: MAIL_SMTP_USERNAME
        value: bilgiislem@fizikon.com
      - key: MAIL_SMTP_PASSWORD
        sync: false
